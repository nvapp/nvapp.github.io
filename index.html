<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Namaz Vakitleri & Geri Sayım</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="container">
        
        <header class="header-section">
            <h1 id="location-text">Konum Bekleniyor...</h1>
            <p id="date-text">-- / -- / ----</p>
            
            <div class="search-box">
                <input type="text" id="city-input" placeholder="Şehir adı girin (Örn: Niğde)">
                <button id="search-btn" class="btn-primary">Ara</button>
            </div>
            <button id="get-location-btn" class="btn-secondary" style="margin-top: 10px; background: #6b7280; color: white; border: none; padding: 8px 16px; border-radius: 8px; cursor: pointer;">📍 Konumumu Bul (GPS)</button>
        </header>

        <section class="countdown-section">
            <h2 id="next-prayer-name">Sonraki Vakit</h2>
            <div class="countdown-timer" id="countdown-timer">
                --:--:--
            </div>
            <p class="kalan-sure-etiketi">kaldı</p>
        </section>

        <section class="times-section">
            <ul class="times-list" id="times-list">
                <li class="time-card" id="card-imsak">
                    <span class="vakit-adi">İmsak</span>
                    <span class="vakit-saati" id="time-imsak">--:--</span>
                </li>
                <li class="time-card" id="card-gunes">
                    <span class="vakit-adi">Güneş</span>
                    <span class="vakit-saati" id="time-gunes">--:--</span>
                </li>
                <li class="time-card" id="card-ogle">
                    <span class="vakit-adi">Öğle</span>
                    <span class="vakit-saati" id="time-ogle">--:--</span>
                </li>
                <li class="time-card" id="card-ikindi">
                    <span class="vakit-adi">İkindi</span>
                    <span class="vakit-saati" id="time-ikindi">--:--</span>
                </li>
                <li class="time-card" id="card-aksam">
                    <span class="vakit-adi">Akşam</span>
                    <span class="vakit-saati" id="time-aksam">--:--</span>
                </li>
                <li class="time-card" id="card-yatsi">
                    <span class="vakit-adi">Yatsı</span>
                    <span class="vakit-saati" id="time-yatsi">--:--</span>
                </li>
            </ul>
        </section>
        
    </main>

    <script src="app.js"></script>
</body>
</html>
